name: VC Tracker Deploy

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Debug directory
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo "=== Looking for project ==="
          find . -name "main.py" -o -name "multi_crawler.py" 2>/dev/null | head -5
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      
      - name: Crawl data
        run: |
          # 查找项目目录（忽略大小写，匹配空格）
          PROJECT_DIR=$(find . -type d -iname "*News*VC*" | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Cannot find project directory"
            exit 1
          fi
          echo "Found project at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # 确保 vc_tracker 包存在
          mkdir -p vc_tracker
          touch vc_tracker/__init__.py
          
          # 运行爬虫
          python3 << 'PYEOF'
import sys
import os
sys.path.insert(0, os.getcwd())

from vc_tracker.multi_crawler import MultiCrawler
import shutil

print("Starting crawler...")
mc = MultiCrawler()
mc.crawl_selected(["hackernews", "paulgraham"], max_items_per_site=20)
mc.save_data()

os.makedirs("static", exist_ok=True)
shutil.copy("data/multi_source_news.json", "static/data.json")

print(f"Success! Crawled {len(mc.data)} items")
PYEOF
      
      - name: Commit changes
        run: |
          PROJECT_DIR=$(find . -type d -iname "*News*VC*" | head -1)
          cd "$PROJECT_DIR"
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/ static/
          git commit -m "Update VC data $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push || echo "Nothing to push"

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/configure-pages@v4
      
      - name: Prepare site
        run: |
          PROJECT_DIR=$(find . -type d -iname "*News*VC*" | head -1)
          mkdir -p docs
          
          if [ -f "$PROJECT_DIR/static/index.html" ]; then
            cp "$PROJECT_DIR/static/index.html" docs/
          else
            echo "<!DOCTYPE html><html><head><title>VC Tracker</title></head><body><h1>VC Tracker</h1><p>Loading...</p></body></html>" > docs/index.html
          fi
          
          if [ -f "$PROJECT_DIR/static/data.json" ]; then
            cp "$PROJECT_DIR/static/data.json" docs/
          else
            echo "[]" > docs/data.json
          fi
          
          echo "Site prepared"
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          branch: gh-pages