<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VC追踪器 - VC & Startup News</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.8em; margin-bottom: 15px; }
        .header p { opacity: 0.95; font-size: 1.2em; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: bold; }
        .stat-label { font-size: 0.9em; opacity: 0.9; }
        .controls {
            padding: 25px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        select, input {
            padding: 12px 18px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 14px;
            min-width: 200px;
        }
        .last-update {
            padding: 15px 30px;
            background: #e9ecef;
            text-align: center;
            color: #6c757d;
            font-size: 0.9em;
        }
        .table-container {
            max-height: 600px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: linear-gradient(135deg, #495057 0%, #343a40 100%);
            color: white;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: top;
        }
        tr:hover { background: #f8f9fa; }
        tr:nth-child(even) { background: #fafbfc; }
        .source-tag {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .source-PaulGraham { background: #e8f5e9; color: #2e7d32; }
        .source-HackerNews { background: #fff3e0; color: #ef6c00; }
        .source-ProductHunt { background: #fce4ec; color: #c2185b; }
        .source-IT桔子 { background: #e3f2fd; color: #1976d2; }
        .title-link {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 500;
        }
        .title-link:hover { color: #667eea; text-decoration: underline; }
        .sector-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }
        .footer {
            padding: 25px;
            text-align: center;
            background: #f8f9fa;
            color: #6c757d;
            font-size: 0.9em;
        }
        .github-link {
            display: inline-block;
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .controls { flex-direction: column; }
            select, input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 VC追踪器</h1>
            <p>聚合全球创业投资资讯 | Paul Graham · Hacker News · Product Hunt · IT桔子</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">-</div>
                    <div class="stat-label">总新闻数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="lastUpdate">-</div>
                    <div class="stat-label">最后更新</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <select id="source-filter" onchange="filterData()">
                <option value="all">📊 全部来源</option>
                <option value="Paul Graham">📝 Paul Graham</option>
                <option value="Hacker News">🔥 Hacker News</option>
                <option value="Product Hunt">🚀 Product Hunt</option>
                <option value="IT桔子">💰 IT桔子</option>
            </select>
            <input type="text" id="search-input" placeholder="🔍 搜索标题..." onkeyup="filterData()">
        </div>
        
        <div class="last-update" id="updateInfo">
            正在加载数据...
        </div>
        
        <div class="table-container">
            <table id="news-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">序号</th>
                        <th style="width: 150px;">来源</th>
                        <th>标题</th>
                        <th style="width: 150px;">领域</th>
                        <th style="width: 120px;">发布时间</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="5" class="loading">
                            <div>📡 正在加载数据...</div>
                            <div style="margin-top: 10px; font-size: 0.9em;">首次访问可能需要几秒钟</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>💡 数据每天自动更新2次（北京时间10:00和22:00）</p>
            <p>数据来源：Hacker News, Paul Graham, Product Hunt, IT桔子</p>
            <a href="https://github.com/yourusername/News-about-VC" class="github-link" target="_blank">
                📁 查看GitHub源码
            </a>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to load data');
                
                allData = await response.json();
                
                if (allData.length === 0) {
                    showError('暂无数据，请稍后再试');
                    return;
                }
                
                // 更新统计
                document.getElementById('totalCount').textContent = allData.length;
                
                // 获取最后更新时间
                const lastItem = allData[0];
                if (lastItem && lastItem.crawl_time) {
                    const date = new Date(lastItem.crawl_time);
                    const timeStr = date.toLocaleString('zh-CN', {
                        month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
                    });
                    document.getElementById('lastUpdate').textContent = timeStr;
                    document.getElementById('updateInfo').textContent = `数据最后更新：${timeStr}`;
                }
                
                filterData();
                
            } catch (error) {
                console.error('Error loading data:', error);
                showError('加载数据失败，请刷新页面重试');
            }
        }
        
        function showError(message) {
            document.getElementById('table-body').innerHTML = `
                <tr>
                    <td colspan="5" class="error">
                        <div style="font-size: 3em; margin-bottom: 10px;">⚠️</div>
                        <div>${message}</div>
                        <div style="margin-top: 15px; font-size: 0.9em;">
                            <button onclick="location.reload()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                刷新页面
                            </button>
                        </div>
                    </td>
                </tr>
            `;
            document.getElementById('updateInfo').textContent = '数据加载失败';
        }
        
        function filterData() {
            const sourceFilter = document.getElementById('source-filter').value;
            const searchKeyword = document.getElementById('search-input').value.toLowerCase().trim();
            
            filteredData = allData.filter(item => {
                // 来源筛选
                if (sourceFilter !== 'all' && item.source !== sourceFilter) {
                    return false;
                }
                
                // 关键词搜索
                if (searchKeyword) {
                    const title = (item.title || '').toLowerCase();
                    const summary = (item.summary || '').toLowerCase();
                    if (!title.includes(searchKeyword) && !summary.includes(searchKeyword)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            displayData();
        }
        
        function displayData() {
            const tbody = document.getElementById('table-body');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 60px; color: #6c757d;">
                            <div style="font-size: 3em; margin-bottom: 10px;">📭</div>
                            <div>没有找到匹配的数据</div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            filteredData.forEach((item, index) => {
                const sourceClass = 'source-' + item.source.replace(/\s/g, '');
                const title = item.title.length > 100 ? item.title.substring(0, 100) + '...' : item.title;
                
                let timeDisplay = '--';
                if (item.publish_time) {
                    const date = new Date(item.publish_time);
                    if (!isNaN(date.getTime())) {
                        timeDisplay = date.toLocaleString('zh-CN', {
                            month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
                        });
                    }
                }
                
                html += `
                    <tr>
                        <td style="text-align: center; font-weight: bold; color: #667eea;">${index + 1}</td>
                        <td><span class="source-tag ${sourceClass}">${item.source}</span></td>
                        <td>
                            <a href="${item.url}" target="_blank" class="title-link">${title}</a>
                            ${item.summary ? `<br><small style="color: #6c757d; margin-top: 5px; display: block;">${item.summary.substring(0, 150)}${item.summary.length > 150 ? '...' : ''}</small>` : ''}
                        </td>
                        <td>${item.sector ? `<span class="sector-tag">${item.sector}</span>` : '--'}</td>
                        <td style="white-space: nowrap; color: #6c757d; font-size: 0.9em;">${timeDisplay}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // 页面加载时获取数据
        loadData();
    </script>
</body>
</html>
